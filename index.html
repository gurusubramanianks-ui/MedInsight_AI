<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MedInsight AI</title>
    <style>
        body { font-family: sans-serif; padding: 40px; background: #f4f4f9; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; width: 100%; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; }
        #result { margin-top: 20px; line-height: 1.6; }
        .err { color: red; background: #ffdada; padding: 10px; border-radius: 4px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>MedInsight AI</h2>
    <input type="file" id="reportFile" accept="image/*,application/pdf" style="margin-bottom: 20px;">
    <button id="btn" onclick="run()">Analyze Report</button>
    <div id="result"></div>
</div>

<script>
    async function run() {
        const file = document.getElementById('reportFile').files[0];
        const btn = document.getElementById('btn');
        const resDiv = document.getElementById('result');

        if (!file) return alert("Select a file");

        btn.disabled = true;
        btn.innerText = "Processing...";
        resDiv.innerHTML = "<em>AI is interpreting your results...</em>";

        try {
            const base64 = await new Promise((res, rej) => {
                const reader = new FileReader();
                reader.onload = () => res(reader.result);
                reader.readAsDataURL(file);
            });

            // TARGET URL: Change this to your exact Railway URL
            const railwayUrl = 'https://medinsightai-production.up.railway.app/analyze';

            const response = await fetch(railwayUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fileData: base64 })
            });

            if (!response.ok) throw new Error("Server responded with error " + response.status);

            const data = await response.json();
            resDiv.innerHTML = data.htmlContent;
        } catch (e) {
            resDiv.innerHTML = `<div class="err"><strong>Fetch Error:</strong> ${e.message}<br>Check if your Railway URL starts with https://</div>`;
        } finally {
            btn.disabled = false;
            btn.innerText = "Analyze Report";
        }
    }
</script>
</body>
</html>
