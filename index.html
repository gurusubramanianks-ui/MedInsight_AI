<body>
    <h1>MedInsight Lab Analyzer</h1>
    
    <div style="border: 2px dashed #ccc; padding: 20px; border-radius: 10px;">
        <input type="file" id="reportFile" accept="image/*">
        <button onclick="analyzeReport()" id="uploadBtn">Analyze Report</button>
    </div>

    <div id="output" style="margin-top: 20px; text-align: left; white-space: pre-wrap; padding: 15px; background: #f9f9f9; border-radius: 5px;">
        Results will appear here...
    </div>

    <script>
        const API_URL = "https://medinsightai-production.up.railway.app"; // Update this!

        async function analyzeReport() {
            const fileInput = document.getElementById('reportFile');
            const output = document.getElementById('output');
            const btn = document.getElementById('uploadBtn');

            if (!fileInput.files[0]) return alert("Please select an image first!");

            output.innerText = "Analyzing... (this may take 10-15 seconds)";
            btn.disabled = true;

            const formData = new FormData();
            formData.append('report', fileInput.files[0]);

            try {
                const response = await fetch(`${API_URL}/analyze`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error);

                output.innerText = data.analysis;
            } catch (err) {
                output.innerText = "Error: " + err.message;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
