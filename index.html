<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedInsight AI Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --red: #d9534f; --green: #5cb85c; --blue: #0275d8;
            --orange: #f0ad4e; --cyan: #5bc0de; --purple: #605ca8;
        }
        body { font-family: 'Inter', 'Segoe UI', sans-serif; max-width: 900px; margin: 40px auto; padding: 20px; background-color: #f8f9fa; color: #2d3436; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); border: 1px solid #eee; }
        
        /* Colored Headings Logic */
        #analysisContent h1:nth-of-type(1) { color: var(--red); }
        #analysisContent h1:nth-of-type(2) { color: var(--green); }
        #analysisContent h1:nth-of-type(3) { color: var(--blue); }
        #analysisContent h1:nth-of-type(4) { color: var(--orange); }
        #analysisContent h1:nth-of-type(5) { color: var(--cyan); }
        #analysisContent h1:nth-of-type(6) { color: var(--purple); }
        #analysisContent h1:nth-of-type(7) { color: #333; }

        #analysisContent h1 { font-size: 1.4rem; margin-top: 40px; border-bottom: 2px solid #f1f1f1; padding-bottom: 10px; }
        
        /* Spacing for Bullets */
        #analysisContent li { margin-bottom: 18px; line-height: 1.7; }
        #analysisContent ul { padding-left: 20px; }

        .status-bar { margin-bottom: 30px; font-size: 0.9rem; display: flex; align-items: center; gap: 10px; }
        .dot { height: 10px; width: 10px; border-radius: 50%; background: #ccc; }
        
        button { background: #007bff; color: white; border: none; padding: 16px; border-radius: 12px; cursor: pointer; font-size: 1rem; font-weight: 600; width: 100%; transition: all 0.2s; }
        button:hover { background: #0056b3; transform: translateY(-1px); }
        button:disabled { background: #dfe6e9; cursor: not-allowed; }

        #output { margin-top: 40px; display: none; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        @media print { .card, button, input { display: none; } #output { display: block; } }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="margin-top: 0;">MedInsight Analyzer</h2>
        <div class="status-bar">
            <div id="dot" class="dot"></div>
            <span id="statusText">System Offline</span>
        </div>

        <input type="file" id="reportFile" accept=".pdf, .png, .jpg, .jpeg" style="margin-bottom: 25px; display: block;">
        <button onclick="analyze()" id="btn" disabled>Generate Insight Report</button>
    </div>

    <div id="output" class="card">
        <div id="analysisContent"></div>
        <button onclick="window.print()" style="margin-top: 40px; background: #2d3436;">Download as PDF</button>
    </div>

    <script>
        const API_URL = "https://medinsightai-production.up.railway.app";

        async function init() {
            try {
                const res = await fetch(`${API_URL}/test`);
                if(res.ok) {
                    document.getElementById('dot').style.background = "#5cb85c";
                    document.getElementById('statusText').innerText = "System Online";
                    document.getElementById('btn').disabled = false;
                }
            } catch(e) { document.getElementById('statusText').innerText = "Connecting to Server..."; }
        }
        init();

        async function analyze() {
            const file = document.getElementById('reportFile').files[0];
            if(!file) return alert("Please select a report first.");

            const btn = document.getElementById('btn');
            const out = document.getElementById('output');
            const content = document.getElementById('analysisContent');

            btn.disabled = true;
            out.style.display = "block";
            content.innerHTML = "<i>Analyzing clinical data markers...</i>";

            const fd = new FormData();
            fd.append('report', file);

            try {
                const res = await fetch(`${API_URL}/analyze`, { method: 'POST', body: fd });
                const data = await res.json();
                if(!res.ok) throw new Error(data.details || "Analysis failed");

                // USE MARKED.JS TO PARSE THE RESPONSE
                content.innerHTML = marked.parse(data.analysis);
            } catch(e) {
                content.innerHTML = `<p style="color:red"><b>Error:</b> ${e.message}</p>`;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
