<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedInsight AI Test</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; line-height: 1.6; }
        .box { border: 1px solid #ccc; padding: 15px; margin-bottom: 10px; border-radius: 8px; }
        .success { color: green; font-weight: bold; }
        .error { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h1>MedInsight AI Test</h1>

    <div class="box">
        <h3>Step 1: Check Connection</h3>
        <button onclick="checkStatus()">Check Status</button>
        <p id="statusResult"></p>
    </div>

    <script>
        // UPDATE THIS to your actual Railway URL
        const API_URL = "https://medinsightai-production.up.railway.app/analyze"; 

        async function checkStatus() {
            const res = document.getElementById('statusResult');
            res.innerText = "Checking...";
            try {
                const response = await fetch(`${API_URL}/test`);
                const data = await response.json();
                res.innerHTML = `<span class="success">${data.message}</span>`;
            } catch (err) {
                res.innerHTML = `<span class="error">Failed: ${err.message}</span>`;
            }
        }
    </script>
</body>
</html>
