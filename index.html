<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MedInsight AI Pro</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; line-height: 1.6; background-color: #f4f7f6; }
        .upload-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        #output { margin-top: 20px; padding: 20px; background: white; border-radius: 12px; min-height: 100px; border-left: 5px solid #007bff; white-space: pre-wrap; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>

    <div class="upload-container">
        <h2>MedInsight Lab Report Analyzer</h2>
        <p>Upload a <b>Photo</b>, <b>PDF</b>, or <b>Word (.docx)</b> document</p>
        
        <input type="file" id="reportFile" accept="image/*, application/pdf, .docx" style="margin-bottom: 20px;">
        <br>
        <button onclick="analyzeReport()" id="uploadBtn">Analyze Now</button>
    </div>

    <div id="output">Analysis will appear here...</div>

    <script>
        // Update this with your Railway URL
        const API_URL = "https://medinsightai-production.up.railway.app"; 

        async function analyzeReport() {
            const fileInput = document.getElementById('reportFile');
            const output = document.getElementById('output');
            const btn = document.getElementById('uploadBtn');

            if (!fileInput.files[0]) return alert("Please select a file first!");

            output.innerHTML = "<i>Analyzing your report... this usually takes 10-15 seconds.</i>";
            btn.disabled = true;

            const formData = new FormData();
            formData.append('report', fileInput.files[0]);

            try {
                const response = await fetch(`${API_URL}/analyze`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error);

                output.innerText = data.analysis;
            } catch (err) {
                output.innerHTML = `<b style="color:red">Error: ${err.message}</b>`;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
