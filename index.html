<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedInsight AI | Instant Report Decoder</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f9fafb; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 12px; max-width: 600px; width: 100%; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .header { color: #111827; border-bottom: 2px solid #f3f4f6; padding-bottom: 10px; margin-bottom: 20px; }
        .status-box { padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; }
        .out-of-range { background: #fee2e2; border: 1px solid #fecaca; color: #991b1b; }
        .in-range { background: #dcfce7; border: 1px solid #bbf7d0; color: #166534; }
        button { background: #2563eb; color: white; width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        #output { white-space: pre-wrap; margin-top: 20px; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>MedInsight AI</h2>
        <p>Simple & Secure Medical Report Analysis</p>
    </div>

    <input type="file" id="fileInput" accept=".jpg,.png,.pdf">
    <p style="font-size: 12px; color: #6b7280;">Supported: Blood tests, Urine, Scans (Images/PDF)</p>
    
    <button onclick="startAnalysis()" id="mainBtn">Analyze Report</button>

    <div id="output"></div>
    
    <p style="font-size: 11px; margin-top: 30px; border-top: 1px solid #eee; padding-top: 10px; color: #9ca3af;">
        *Disclaimer: This is an AI recommendation. Consult a Specialist Doctor and Nutritionist.
    </p>
</div>

<script>
    async function startAnalysis() {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return alert("Please select a file.");
        
        const btn = document.getElementById('mainBtn');
        const output = document.getElementById('output');
        
        btn.innerText = "Reading Report...";
        output.innerHTML = "<em>AI is scanning your markers against ICMR standards...</em>";

        // Step: Convert file to Base64 (simplified for demo)
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = async () => {
            try {
                const response = await fetch(''https://medinsightai-production.up.railway.app/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fileData: reader.result })
                });
                const result = await response.json();
                output.innerHTML = result.htmlContent;
            } catch (e) {
                output.innerHTML = "Analysis failed. Please check your connection.";
            } finally {
                btn.innerText = "Analyze Report";
            }
        };
    }
</script>
</body>
</html>
