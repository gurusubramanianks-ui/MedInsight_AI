<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedInsight AI Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; line-height: 1.6; background-color: #f4f7f6; text-align: center; }
        .upload-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #output { margin-top: 20px; padding: 20px; background: white; border-radius: 12px; min-height: 100px; border-left: 5px solid #007bff; white-space: pre-wrap; text-align: left; }
        button { background: #007bff; color: white; border: none; padding: 12px 24px; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        input[type="file"] { margin: 20px 0; padding: 10px; border: 1px solid #ddd; border-radius: 5px; width: 100%; max-width: 300px; }
    </style>
</head>
<body>

    <div class="upload-container">
        <h2>MedInsight Lab Report Analyzer</h2>
        <p>Upload your report (PDF, Image, or Word)</p>
        
        <input type="file" id="reportFile" 
            accept=".pdf, .doc, .docx, application/pdf, image/*">
        <br>
        <button onclick="analyzeReport()" id="uploadBtn">Analyze Now</button>
    </div>

    <div id="output">Analysis will appear here...</div>

    <script>
        // BE SURE TO REPLACE THIS WITH YOUR REAL RAILWAY URL
        const API_URL = "https://medinsightai-production.up.railway.app"; 

        async function analyzeReport() {
            const fileInput = document.getElementById('reportFile');
            const output = document.getElementById('output');
            const btn = document.getElementById('uploadBtn');

            if (!fileInput.files || !fileInput.files[0]) {
                return alert("Please select a file first!");
            }

            output.innerHTML = "<i>⏳ Analyzing... this takes about 15 seconds. Please wait.</i>";
            btn.disabled = true;

            const formData = new FormData();
            formData.append('report', fileInput.files[0]);

            try {
                const response = await fetch(`${API_URL}/analyze`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || `Server error: ${response.status}`);
                }

                const data = await response.json();
                output.innerText = data.analysis;
            } catch (err) {
                console.error("Full Error:", err);
                output.innerHTML = `<b style="color:red">Error: ${err.message}</b><br><small>Check console for more details.</small>`;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
