<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MedInsight AI Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 900px; margin: 40px auto; padding: 20px; background-color: #f0f4f8; color: #333; }
        .card { background: white; padding: 35px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        #output { margin-top: 30px; text-align: left; background: #fff; padding: 25px; border-radius: 10px; border-top: 5px solid #007bff; display: none; }
        button { background: #007bff; color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600; width: 100%; }
        button:disabled { background: #b0c4de; }
        h2 { color: #0056b3; }
        pre { white-space: pre-wrap; word-wrap: break-word; font-family: inherit; }
    </style>
</head>
<body>

    <div class="card">
        <h2>MedInsight Analyzer</h2>
        <div style="margin-bottom: 20px;">
            <span id="statusDot" class="status-dot" style="background-color: gray;"></span>
            <span id="statusText">Checking Connection...</span>
        </div>

        <input type="file" id="reportFile" accept=".pdf, .png, .jpg, .jpeg" style="margin-bottom: 20px;">
        <button onclick="analyze()" id="analyzeBtn" disabled>Analyze Now</button>
    </div>

    <div id="output">
        <div id="analysisContent"></div>
        <hr>
        <button onclick="window.print()" style="background: #28a745;">Download / Print Report</button>
    </div>

    <script>
        const API_URL = "https://medinsightai-production.up.railway.app";

        async function check() {
            try {
                const res = await fetch(`${API_URL}/test`);
                if (res.ok) {
                    document.getElementById('statusDot').style.backgroundColor = "green";
                    document.getElementById('statusText').innerText = "System Online";
                    document.getElementById('analyzeBtn').disabled = false;
                }
            } catch (e) {
                document.getElementById('statusText').innerText = "Connecting...";
            }
        }
        check();

        async function analyze() {
            const file = document.getElementById('reportFile').files[0];
            if (!file) return alert("Select a file first!");

            const btn = document.getElementById('analyzeBtn');
            const out = document.getElementById('output');
            const content = document.getElementById('analysisContent');

            btn.disabled = true;
            out.style.display = "block";
            content.innerHTML = "<i>🔍 Running multi-point clinical analysis for Guru Sankaran...</i>";

            const fd = new FormData();
            fd.append('report', file);

            try {
                const res = await fetch(`${API_URL}/analyze`, { method: 'POST', body: fd });
                const data = await res.json();
                if (!res.ok) throw new Error(data.details || data.error);
                
                // Converting Markdown-ish AI text to better readable format
                content.innerText = data.analysis;
            } catch (e) {
                content.innerHTML = `<b style="color:red">Error: ${e.message}</b>`;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
