<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MedInsight Fix</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        #status { padding: 20px; border: 1px solid #ccc; margin-top: 20px; border-radius: 10px; }
        .success { color: green; border-color: green; background: #f0fff0; }
        .error { color: red; border-color: red; background: #fff0f0; }
    </style>
</head>
<body>
    <h1>System Status</h1>
    <button id="checkBtn">Test API Connection</button>
    <div id="status">Waiting for input...</div>

    <script>
        // IMPORTANT: Change this to your ACTUAL Railway URL
        // Example: "https://medinsight-production.up.railway.app"
        const API_URL = "https://medinsightai-production.up.railway.app";

        document.getElementById('checkBtn').onclick = async () => {
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = "Connecting...";

            try {
                // We add /test to ensure we are asking for the JSON route
                const response = await fetch(`${API_URL}/test`);
                
                if (!response.ok) {
                    throw new Error(`Server returned HTML/Error (${response.status})`);
                }

                const data = await response.json();
                statusDiv.innerText = `Connected! message: ${data.message}`;
                statusDiv.className = "success";
            } catch (err) {
                console.error(err);
                statusDiv.innerText = `Error: ${err.message}. Check if your Railway URL is correct and the service is 'Active'.`;
                statusDiv.className = "error";
            }
        };
    </script>
</body>
</html>
