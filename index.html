<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedInsight AI | Personal Health Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .mi-card { background: #fff; padding: 30px; border-radius: 15px; max-width: 500px; width: 100%; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 5px solid #007bff; }
        h2 { color: #007bff; margin-top: 0; }
        .section { margin-bottom: 20px; padding: 15px; border-radius: 8px; background: #fafafa; border: 1px solid #eee; }
        input[type="file"] { margin: 15px 0; display: block; }
        button { background: #007bff; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; width: 100%; transition: background 0.3s; }
        button:hover { background: #0056b3; }
        .warning-box { font-size: 12px; color: #666; margin-top: 20px; border-top: 1px solid #eee; padding-top: 10px; font-style: italic; }
        #mi-identity-alert { display: none; background: #fff3cd; border: 1px solid #ffeeba; padding: 10px; border-radius: 5px; margin-bottom: 15px; color: #856404; font-size: 14px; }
    </style>
</head>
<body>

<div class="mi-card">
    <h2>MedInsight AI</h2>
    <p>Upload your medical report for a personalized AI summary.</p>

    <div id="mi-identity-alert">
        <strong>⚠️ Profile Check</strong>
        <p id="mi-name-warning"></p>
    </div>

    <div class="section">
        <label><strong>1. Select Report (PDF/Image)</strong></label>
        <input type="file" id="mi-file-input" accept=".pdf, .jpg, .png, .jpeg">
    </div>

    <div class="section">
        <label>
            <input type="checkbox" id="mi-consent"> I agree to the privacy policy and understand this is not a medical diagnosis.
        </label>
    </div>

    <button id="analyze-btn" disabled>Generate Analysis</button>

    <div id="results-area" style="margin-top:25px; display:none;">
        <hr>
        <div id="mi-motivation" style="font-weight: bold; color: #28a745; margin-bottom: 15px;"></div>
        <div id="mi-summary-content"></div>
    </div>

    <div class="warning-box">
        Warning: This AI tool provides recommendations only. Always check with a Specialist Doctor and Nutritionist.
    </div>
</div>

<script>
    const consentCheck = document.getElementById('mi-consent');
    const analyzeBtn = document.getElementById('analyze-btn');

    // Enable button only when consent is given
    consentCheck.addEventListener('change', (e) => {
        analyzeBtn.disabled = !e.target.checked;
        analyzeBtn.style.opacity = e.target.checked ? "1" : "0.5";
    });

    analyzeBtn.addEventListener('click', async () => {
        const fileInput = document.getElementById('mi-file-input');
        if (!fileInput.files[0]) return alert("Please upload a file.");

        analyzeBtn.innerText = "AI is analyzing...";
        
        // This is where we will link to your Backend (Step 2)
        setTimeout(() => {
            document.getElementById('results-area').style.display = "block";
            document.getElementById('mi-motivation').innerText = "1 in 100 have diabetes. A good diet and exercise can help you! Be positive and enjoy your life.";
            document.getElementById('mi-summary-content').innerHTML = "<h3>What's looking Good</h3><ul><li>Your Hemoglobin is perfect.</li></ul>";
            analyzeBtn.innerText = "Generate Analysis";
        }, 2000);
    });
</script>

</body>
</html>
